version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: neurosense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: neurosense-backend
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    volumes:
      - ../../backend/models:/app/models
      - ../../backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    build:
      context: ../..
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: neurosense-celery
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - ../../.env
    volumes:
      - ../../backend/models:/app/models
      - ../../backend/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  celery_beat:
    build:
      context: ../..
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: neurosense-celery-beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend/Dockerfile
    container_name: neurosense-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
