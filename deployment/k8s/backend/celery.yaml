apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosense-celery-worker
  labels:
    app: neurosense
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neurosense
      component: celery-worker
  template:
    metadata:
      labels:
        app: neurosense
        component: celery-worker
    spec:
      containers:
        - name: celery
          image: neurosense/backend:latest
          command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: neurosense-config
            - secretRef:
                name: neurosense-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: neurosense-models
        - name: uploads
          persistentVolumeClaim:
            claimName: neurosense-uploads
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosense-celery-beat
  labels:
    app: neurosense
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neurosense
      component: celery-beat
  template:
    metadata:
      labels:
        app: neurosense
        component: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: neurosense/backend:latest
          command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: neurosense-config
            - secretRef:
                name: neurosense-secrets
