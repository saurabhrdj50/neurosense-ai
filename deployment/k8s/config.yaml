apiVersion: v1
kind: ConfigMap
metadata:
  name: neurosense-config
data:
  FLASK_ENV: "production"
  FLASK_DEBUG: "0"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://neurosense.example.com"
  REDIS_URL: "redis://neurosense-redis:6379/0"
  DATA_RETENTION_DAYS: "90"
---
apiVersion: v1
kind: Secret
metadata:
  name: neurosense-secrets
type: Opaque
stringData:
  GEMINI_API_KEY: "YOUR_API_KEY_HERE"
  SENTRY_DSN: "YOUR_SENTRY_DSN_HERE"
  SECRET_KEY: "YOUR_SECRET_KEY_HERE"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neurosense-models
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neurosense-uploads
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neurosense-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neurosense-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
