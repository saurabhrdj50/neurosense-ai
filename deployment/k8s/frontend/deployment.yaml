apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosense-frontend
  labels:
    app: neurosense
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neurosense
      component: frontend
  template:
    metadata:
      labels:
        app: neurosense
        component: frontend
    spec:
      containers:
        - name: frontend
          image: neurosense/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "http://neurosense-backend:5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: neurosense-frontend
spec:
  selector:
    app: neurosense
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
