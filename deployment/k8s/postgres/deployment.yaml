apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosense-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neurosense
      component: postgres
  template:
    metadata:
      labels:
        app: neurosense
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "neurosense"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: neurosense-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neurosense-secrets
                  key: postgres-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
---
apiVersion: v1
kind: Service
metadata:
  name: neurosense-postgres
spec:
  selector:
    app: neurosense
    component: postgres
  ports:
    - port: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
