apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurosense-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neurosense
      component: redis
  template:
    metadata:
      labels:
        app: neurosense
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
---
apiVersion: v1
kind: Service
metadata:
  name: neurosense-redis
spec:
  selector:
    app: neurosense
    component: redis
  ports:
    - port: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
