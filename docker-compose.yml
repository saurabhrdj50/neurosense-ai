version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: neurosense-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend/models:/app/models
      - ./backend/uploads:/app/uploads
      - ./patient_data.db:/app/patient_data.db
    restart: unless-stopped
    working_dir: /app

  frontend:
    build:
      context: ./frontend
    container_name: neurosense-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
