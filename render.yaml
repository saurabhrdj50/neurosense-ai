services:
  - type: web
    name: neurosense-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: https://neurosense-ai.vercel.app,https://neurosense-ai-*.vercel.app
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
